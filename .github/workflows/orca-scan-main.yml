name: Orca scan on push to main
on:
  push:
    branches: [main]
jobs:
  orca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Orca scan
        run: |
          # invoke the Orca scan CLI here (same CLI as "scan now" / local scan)
        env:
          ORCA_SECURITY_API_TOKEN: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
